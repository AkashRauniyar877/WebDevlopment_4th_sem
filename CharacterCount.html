<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
        <textarea id="msg" onkeyup="CountChar()"></textarea>

        <p id="count">

        </p>

        <script>
            function CountChar(){
                let msg = document.getElementById('msg').value;
                let count = msg.length;
                document.getElementById('count').innerHTML = "Character Count : " + count;
            }

</script>

</body>
</html>
